<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Restaurant Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a1a; }
.header { background: #075e54; color: white; padding: 12px 16px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .refresh { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 4px 8px; }

.tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; overflow-x: auto; position: sticky; top: 44px; z-index: 99; }
.tab { flex: 1; min-width: 70px; padding: 10px 6px; text-align: center; font-size: 12px; font-weight: 500; color: #666; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
.tab.active { color: #075e54; border-bottom-color: #075e54; }

.page { display: none; padding: 12px; padding-bottom: 80px; }
.page.active { display: block; }

.card { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
.card h3 { font-size: 15px; margin-bottom: 6px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat { background: #fff; border-radius: 8px; padding: 14px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
.stat .val { font-size: 24px; font-weight: 700; color: #075e54; }
.stat .label { font-size: 11px; color: #888; margin-top: 2px; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-pending { background: #fff3cd; color: #856404; }
.badge-paid, .badge-preparing { background: #d4edda; color: #155724; }
.badge-ready { background: #cce5ff; color: #004085; }
.badge-picked_up { background: #e2e3e5; color: #383d41; }
.badge-cancelled { background: #f8d7da; color: #721c24; }

.btn { display: inline-block; padding: 8px 14px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-primary { background: #075e54; color: #fff; }
.btn-success { background: #28a745; color: #fff; }
.btn-warning { background: #ffc107; color: #000; }
.btn-danger { background: #dc3545; color: #fff; }
.btn-outline { background: #fff; color: #075e54; border: 1px solid #ccc; }
.btn-outline.active { background: #075e54; color: #fff; border-color: #075e54; }

.order-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.order-items { font-size: 13px; margin: 6px 0; list-style: none; }
.order-items li { margin: 2px 0; }
.paid-via { font-size: 11px; color: #666; font-style: italic; margin-top: 4px; }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.form-group textarea { height: 60px; resize: vertical; }

.cat-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; margin-bottom: 6px; }
.item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; gap: 8px; }
.item-info { flex: 1; min-width: 0; }
.item-info .name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-info .price { font-size: 13px; color: #075e54; font-weight: 600; }
.item-info .desc { font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }

.toggle { width: 40px; height: 22px; background: #ccc; border-radius: 11px; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
.toggle.on { background: #28a745; }
.toggle::after { content: ''; width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left .2s; }
.toggle.on::after { left: 20px; }

.modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: #fff; border-radius: 12px 12px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 18px; margin-bottom: 16px; }

.filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }

.log-line { font-family: monospace; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #f5f5f5; word-break: break-all; }
.empty { text-align: center; color: #888; padding: 40px 20px; font-size: 14px; }
.meta { font-size: 12px; color: #888; }
</style>
</head>
<body>

<div class="header">
    <h1 id="restaurantName">Restaurant Admin</h1>
    <button class="refresh" onclick="loadAll()">&#8635;</button>
</div>

<div class="tabs">
    <div class="tab active" data-page="dashboard">Dashboard</div>
    <div class="tab" data-page="orders">Orders</div>
    <div class="tab" data-page="menu">Menu</div>
    <div class="tab" data-page="settings">Settings</div>
    <div class="tab" data-page="logs">Logs</div>
</div>

<div class="page active" id="page-dashboard">
    <div class="stat-grid" id="stats"></div>
    <h3 style="margin:12px 0 8px;font-size:15px;">Active Orders</h3>
    <div id="active-orders"></div>
</div>

<div class="page" id="page-orders">
    <div class="filter-row">
        <button class="btn btn-sm btn-outline active" data-status="" onclick="filterOrders(this)">All</button>
        <button class="btn btn-sm btn-outline" data-status="pending_payment" onclick="filterOrders(this)">Pending</button>
        <button class="btn btn-sm btn-outline" data-status="paid" onclick="filterOrders(this)">Paid</button>
        <button class="btn btn-sm btn-outline" data-status="preparing" onclick="filterOrders(this)">Cooking</button>
        <button class="btn btn-sm btn-outline" data-status="ready" onclick="filterOrders(this)">Ready</button>
        <button class="btn btn-sm btn-outline" data-status="picked_up" onclick="filterOrders(this)">Done</button>
        <button class="btn btn-sm btn-outline" data-status="cancelled" onclick="filterOrders(this)">Cancel</button>
    </div>
    <div id="all-orders"></div>
</div>

<div class="page" id="page-menu">
    <button class="btn btn-primary" onclick="showAddCategory()" style="margin-bottom:12px;">+ Add Category</button>
    <div id="menu-list"></div>
</div>

<div class="page" id="page-settings">
    <div class="card">
        <h3>Restaurant Config</h3>
        <div class="form-group"><label>Name</label><input id="cfg-name"></div>
        <div class="form-group"><label>Currency Symbol</label><input id="cfg-currency"></div>
        <div class="form-group"><label>Payment Note</label><textarea id="cfg-payment"></textarea></div>
        <div class="form-group"><label>Greeting Text</label><textarea id="cfg-greeting"></textarea></div>
        <div class="form-group"><label>Greeting Image (URL or filename)</label><input id="cfg-image"></div>
        <button class="btn btn-primary" onclick="saveConfig()">Save Config</button>
    </div>
    <div class="card" style="margin-top:12px;">
        <h3>Team & Roles</h3>
        <div class="meta" style="margin-bottom:10px;">
            <b>Owner</b> — gets all notifications<br>
            <b>Cashier</b> — new orders + payment confirmations<br>
            <b>Cook</b> — cooking/ready polls after payment
        </div>
        <div id="roles-list"></div>
        <div style="display:flex;gap:6px;margin-top:10px;">
            <input id="new-admin-phone" placeholder="Phone (e.g. 919876543210)" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
            <select id="new-admin-role" style="padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
                <option value="owner">Owner</option>
                <option value="cashier">Cashier</option>
                <option value="cook">Cook</option>
            </select>
            <button class="btn btn-sm btn-primary" onclick="addAdmin()">Add</button>
        </div>
    </div>
</div>

<div class="page" id="page-logs">
    <button class="btn btn-sm btn-outline" onclick="loadLogs()" style="margin-bottom:8px;">Refresh Logs</button>
    <div id="log-list"></div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
    <div class="modal" id="modal-content"></div>
</div>

<script>
let config = {};
let currentFilter = '';
let menuData = null;

document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('page-' + t.dataset.page).classList.add('active');
        if (t.dataset.page === 'logs') loadLogs();
    });
});

async function api(path, opts = {}) {
    const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined });
    return res.json();
}

async function loadAll() {
    config = await api('/api/config');
    document.getElementById('restaurantName').textContent = config.name + ' Admin';
    loadStats(); loadActiveOrders(); loadOrders(); loadMenu(); loadCfg();
}

async function loadStats() {
    const s = await api('/api/stats');
    document.getElementById('stats').innerHTML =
        `<div class="stat"><div class="val">${s.today.total}</div><div class="label">Today Orders</div></div>` +
        `<div class="stat"><div class="val">${s.currency}${s.today.revenue}</div><div class="label">Revenue</div></div>` +
        `<div class="stat"><div class="val">${s.today.paid}</div><div class="label">Paid</div></div>` +
        `<div class="stat"><div class="val">${s.today.cancelled}</div><div class="label">Cancelled</div></div>`;
}

async function loadActiveOrders() {
    const all = await api('/api/orders');
    const active = all.filter(o => ['pending_payment','paid','preparing','ready'].includes(o.status));
    document.getElementById('active-orders').innerHTML = active.length ? active.map(o => renderOrder(o, true)).join('') : '<div class="empty">No active orders</div>';
}

function filterOrders(btn) {
    document.querySelectorAll('.filter-row .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.status;
    loadOrders();
}

async function loadOrders() {
    const url = currentFilter ? `/api/orders?status=${currentFilter}` : '/api/orders';
    const orders = await api(url);
    document.getElementById('all-orders').innerHTML = orders.length ? orders.map(o => renderOrder(o, true)).join('') : '<div class="empty">No orders</div>';
}

function renderOrder(o, showActions) {
    const items = o.items.map(i => `<li>${i.name} x${i.qty} — ${config.currency}${i.qty*i.price}</li>`).join('');
    const date = o.createdAt ? new Date(o.createdAt).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' }) : '';
    const bc = o.status === 'pending_payment' ? 'pending' : o.status;
    const pv = o.paidVia ? `<div class="paid-via">Paid: ${o.paidVia}${o.paidBy ? ' (' + o.paidBy.split('@')[0] + ')' : ''}</div>` : '';
    let acts = '';
    if (showActions) {
        if (o.status === 'pending_payment') acts = `<div class="order-actions"><button class="btn btn-sm btn-success" onclick="confirmPay('${o.id}')">Confirm Payment</button><button class="btn btn-sm btn-danger" onclick="setStatus('${o.id}','cancelled')">Cancel</button></div>`;
        else if (o.status === 'paid') acts = `<div class="order-actions"><button class="btn btn-sm btn-warning" onclick="setStatus('${o.id}','preparing')">Cooking</button><button class="btn btn-sm btn-success" onclick="setStatus('${o.id}','ready')">Ready</button><button class="btn btn-sm btn-danger" onclick="setStatus('${o.id}','cancelled')">Cancel</button></div>`;
        else if (o.status === 'preparing') acts = `<div class="order-actions"><button class="btn btn-sm btn-success" onclick="setStatus('${o.id}','ready')">Ready</button><button class="btn btn-sm btn-danger" onclick="setStatus('${o.id}','cancelled')">Cancel</button></div>`;
        else if (o.status === 'ready') acts = `<div class="order-actions"><button class="btn btn-sm btn-primary" onclick="setStatus('${o.id}','picked_up')">Picked Up</button></div>`;
    }
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3>#${o.token} — ${config.currency}${o.total}</h3><span class="badge badge-${bc}">${sLabel(o.status)}</span></div><ul class="order-items">${items}</ul>${o.creditApplied>0?`<div class="meta">Credit: -${config.currency}${o.creditApplied}</div>`:''}<div class="meta">${o.phone||'N/A'} | ${date}</div>${pv}${acts}</div>`;
}

async function confirmPay(id) { await api(`/api/orders/main/${id}/confirm-payment`, { method: 'POST' }); loadAll(); }
async function setStatus(id, s) { await api(`/api/orders/main/${id}`, { method: 'PUT', body: { status: s } }); loadAll(); }
function sLabel(s) { return { pending_payment:'Awaiting Payment', paid:'Preparing', preparing:'Cooking', ready:'Ready', picked_up:'Picked Up', cancelled:'Cancelled' }[s]||s; }

// ── Menu ────────────────────────────────────────
async function loadMenu() {
    menuData = await api('/api/menu');
    const el = document.getElementById('menu-list');
    if (!menuData.categories.length) { el.innerHTML = '<div class="empty">No categories</div>'; return; }
    el.innerHTML = menuData.categories.map(cat => {
        const items = cat.items.map(it => `<div class="item-row"><div class="item-info"><div class="name">${it.name}</div><div class="price">${config.currency}${it.price}</div>${it.desc?`<div class="desc">${it.desc}</div>`:''}</div><div class="item-actions"><div class="toggle ${it.available!==false?'on':''}" onclick="toggleAvail('${cat.id}','${it.id}',${it.available===false})"></div><button class="btn btn-sm btn-outline" onclick="showEditItem('${cat.id}','${it.id}')">Edit</button><button class="btn btn-sm btn-danger" onclick="delItem('${cat.id}','${it.id}')">X</button></div></div>`).join('');
        return `<div class="card"><div class="cat-header"><h3>${cat.name}</h3><div><button class="btn btn-sm btn-primary" onclick="showAddItem('${cat.id}')">+ Item</button> <button class="btn btn-sm btn-danger" onclick="delCat('${cat.id}')">Del</button></div></div>${items||'<div class="empty" style="padding:10px">No items</div>'}</div>`;
    }).join('');
}

async function toggleAvail(c,i,off) { await api(`/api/menu/main/category/${c}/item/${i}`, { method:'PUT', body:{available:off} }); loadMenu(); }
async function delItem(c,i) { if(!confirm('Delete?')) return; await api(`/api/menu/main/category/${c}/item/${i}`, {method:'DELETE'}); loadMenu(); }
async function delCat(c) { if(!confirm('Delete category?')) return; await api(`/api/menu/main/category/${c}`, {method:'DELETE'}); loadMenu(); }

function showAddCategory() { showModal(`<h2>Add Category</h2><div class="form-group"><label>Name</label><input id="m-cat"></div><button class="btn btn-primary" onclick="addCat()">Add</button>`); }
async function addCat() { const n=document.getElementById('m-cat').value.trim(); if(!n)return; await api('/api/menu/main/category',{method:'POST',body:{name:n}}); hideModal(); loadMenu(); }

function showAddItem(catId) { showModal(`<h2>Add Item</h2><div class="form-group"><label>Name</label><input id="m-name"></div><div class="form-group"><label>Price</label><input id="m-price" type="number" step="0.01"></div><div class="form-group"><label>Description</label><input id="m-desc"></div><button class="btn btn-primary" onclick="addItem('${catId}')">Add</button>`); }
async function addItem(c) { const n=document.getElementById('m-name').value.trim(),p=document.getElementById('m-price').value,d=document.getElementById('m-desc').value.trim(); if(!n)return; await api(`/api/menu/main/category/${c}/item`,{method:'POST',body:{name:n,price:p,desc:d}}); hideModal(); loadMenu(); }

function showEditItem(catId,itemId) { const cat=menuData.categories.find(c=>c.id===catId); const it=cat?.items.find(i=>i.id===itemId); if(!it)return; showModal(`<h2>Edit Item</h2><div class="form-group"><label>Name</label><input id="m-name" value="${it.name}"></div><div class="form-group"><label>Price</label><input id="m-price" type="number" step="0.01" value="${it.price}"></div><div class="form-group"><label>Description</label><input id="m-desc" value="${it.desc||''}"></div><button class="btn btn-primary" onclick="editItem('${catId}','${itemId}')">Save</button>`); }
async function editItem(c,i) { const n=document.getElementById('m-name').value.trim(),p=document.getElementById('m-price').value,d=document.getElementById('m-desc').value.trim(); if(!n)return; await api(`/api/menu/main/category/${c}/item/${i}`,{method:'PUT',body:{name:n,price:p,desc:d}}); hideModal(); loadMenu(); }

// ── Settings ────────────────────────────────────
function loadCfg() {
    document.getElementById('cfg-name').value = config.name||'';
    document.getElementById('cfg-currency').value = config.currency||'';
    document.getElementById('cfg-payment').value = config.paymentNote||'';
    document.getElementById('cfg-greeting').value = config.greetingText||'';
    document.getElementById('cfg-image').value = config.greetingImage||'';
    renderRoles();
}
function renderRoles() {
    const roles = config.roles || {};
    const admins = config.adminNumbers || [];
    const el = document.getElementById('roles-list');
    if (!admins.length) { el.innerHTML = '<div class="empty" style="padding:10px">No team members</div>'; return; }
    el.innerHTML = admins.map(num => {
        const role = roles[num] || roles[num.replace(/\D/g,'')] || 'owner';
        const roleLabel = { owner:'Owner', cashier:'Cashier', cook:'Cook' }[role] || role;
        const badgeColor = { owner:'#075e54', cashier:'#ffc107', cook:'#28a745' }[role] || '#666';
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;">
            <div><span style="font-size:14px;font-weight:500;">${num}</span> <span class="badge" style="background:${badgeColor};color:#fff;">${roleLabel}</span></div>
            <div style="display:flex;gap:4px;">
                <select onchange="changeRole('${num}',this.value)" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;">
                    <option value="owner" ${role==='owner'?'selected':''}>Owner</option>
                    <option value="cashier" ${role==='cashier'?'selected':''}>Cashier</option>
                    <option value="cook" ${role==='cook'?'selected':''}>Cook</option>
                </select>
                <button class="btn btn-sm btn-danger" onclick="removeAdmin('${num}')">X</button>
            </div>
        </div>`;
    }).join('');
}
async function addAdmin() {
    const phone = document.getElementById('new-admin-phone').value.trim().replace(/\D/g,'');
    const role = document.getElementById('new-admin-role').value;
    if (!phone) return;
    const admins = config.adminNumbers || [];
    if (!admins.includes(phone)) admins.push(phone);
    const roles = config.roles || {};
    roles[phone] = role;
    await api('/api/config', { method:'PUT', body: { adminNumbers: admins, roles } });
    document.getElementById('new-admin-phone').value = '';
    config = await api('/api/config');
    renderRoles();
}
async function removeAdmin(num) {
    if (!confirm('Remove ' + num + '?')) return;
    const admins = (config.adminNumbers||[]).filter(n => n !== num);
    const roles = config.roles || {};
    delete roles[num]; delete roles[num.replace(/\D/g,'')];
    await api('/api/config', { method:'PUT', body: { adminNumbers: admins, roles } });
    config = await api('/api/config');
    renderRoles();
}
async function changeRole(num, role) {
    const roles = config.roles || {};
    roles[num] = role;
    await api('/api/config', { method:'PUT', body: { roles } });
    config = await api('/api/config');
    renderRoles();
}
async function saveConfig() {
    await api('/api/config', { method:'PUT', body: {
        name: document.getElementById('cfg-name').value,
        currency: document.getElementById('cfg-currency').value,
        paymentNote: document.getElementById('cfg-payment').value,
        greetingText: document.getElementById('cfg-greeting').value||null,
        greetingImage: document.getElementById('cfg-image').value||null,
    }});
    alert('Saved!'); loadAll();
}

// ── Logs ────────────────────────────────────────
async function loadLogs() {
    const d = await api('/api/logs');
    document.getElementById('log-list').innerHTML = d.lines.length ? d.lines.map(l=>`<div class="log-line">${l}</div>`).join('') : '<div class="empty">No logs</div>';
}

// ── Modal ───────────────────────────────────────
function showModal(h) { document.getElementById('modal-content').innerHTML=h; document.getElementById('modal-bg').classList.add('show'); }
function hideModal() { document.getElementById('modal-bg').classList.remove('show'); }
function closeModal(e) { if(e.target===document.getElementById('modal-bg')) hideModal(); }

// ── Init ────────────────────────────────────────
loadAll();
setInterval(() => { if(document.querySelector('.page.active')?.id==='page-dashboard') { loadStats(); loadActiveOrders(); } }, 15000);
</script>
</body>
</html>
